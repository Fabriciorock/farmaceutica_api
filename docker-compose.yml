version: "3.9"

services:
  db:
    image: postgres:16
    container_name: farmaceutica_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: farmacia_user
      POSTGRES_PASSWORD: farmacia_pass
      POSTGRES_DB: farmaceutica_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmacia_user -d farmaceutica_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: farmaceutica_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  api:
    build: .
    container_name: farmaceutica_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://farmacia_user:farmacia_pass@db:5432/farmaceutica_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  pgadmin_data: